name: scheduled-crons

# 모든 정기 작업은 '관리자 설정형 예약 스케줄'로 서버가 실행 시점을 판단한다.
# GitHub Actions 는 15분마다 디스패처(/api/admin/cron/tick)를 두드리는 '틱' 역할만 한다.
# 실제 실행 요일/시각·on-off 는 관리자 화면(쿠폰 미션 설정 > 예약 스케줄)에서 바꾼다.
# (Vercel Hobby 크론 한도 회피를 위해 GitHub Actions 사용. repo=public 이라 Actions 무료·무제한.)
#
# ▶ 반드시 설정해야 작동함:
#   1) Vercel → Settings → Environment Variables 에 CRON_SECRET 추가(임의의 긴 문자열).
#   2) 이 저장소 → Settings → Secrets and variables → Actions → New repository secret:
#        PROD_BASE_URL  = 운영 사이트 베이스 URL(끝 슬래시 없이). 예: https://www.sscsparta.com
#        CRON_SECRET    = 위 1)과 '같은 값'
#
# 참고: GitHub Actions schedule 은 부하 시 수 분 지연될 수 있다(초 단위 정밀 X).
#       디스패처는 "설정 시각 이후 첫 틱"에 실행하고 주기키로 하루/한주/한달 1회를 보장하므로 지연에 안전.
#       특정 작업만 즉시 테스트: Actions 탭 → Run workflow → force_job 선택(스케줄 무시, 주기키 미기록).

on:
  schedule:
    - cron: '*/15 * * * *'   # 15분마다 틱. 실제 실행 여부/대상은 서버가 관리자 설정 기준으로 판단.
  workflow_dispatch:
    inputs:
      force_job:
        description: '특정 작업 강제 실행(테스트). 비우면 일반 틱.'
        required: false
        default: ''
        type: choice
        options: ['', sweep, meal, weekly_settle, monthly_settle, remind, daily_digest]

concurrency:
  group: scheduled-crons
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch tick
        env:
          BASE: ${{ secrets.PROD_BASE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
          FORCE: ${{ github.event.inputs.force_job }}
        run: |
          set -euo pipefail
          if [ -z "${BASE:-}" ] || [ -z "${SECRET:-}" ]; then
            echo "::error::PROD_BASE_URL / CRON_SECRET 시크릿이 설정되지 않았습니다."
            exit 1
          fi
          Q='/api/admin/cron/tick'
          if [ -n "${FORCE:-}" ]; then Q="${Q}?force=${FORCE}"; fi
          echo "GET ${BASE}${Q}"
          code=$(curl -sS -o /tmp/resp -w '%{http_code}' -X GET -H "x-cron-secret: ${SECRET}" "${BASE}${Q}")
          echo "HTTP ${code}"
          cat /tmp/resp 2>/dev/null || true
          echo
          if [ "${code}" != "200" ]; then
            echo "::error::틱 실패 (HTTP ${code}) — CRON_SECRET 일치/PROD_BASE_URL/배포 상태를 확인하세요."
            exit 1
          fi
